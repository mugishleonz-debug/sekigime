<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>席の枠 早わかり図 | 席決めの儀</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --paper:#fffdf7; --ink:#2a2620; --dim:#6f6858; --line:#e8e2d2;
    --groom:#e8b64c;       /* 新郎側 = 金 */
    --groom-bg:#faf3df;
    --bride:#ff5d8f;       /* 新婦側 = ピンク */
    --bride-bg:#ffeef3;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.8;
  }
  .wrap{max-width:760px;margin:0 auto;padding:36px 24px 50px}
  h1{font-size:22px;font-weight:900;letter-spacing:.1em;text-align:center;margin:0 0 2px}
  .sub{text-align:center;color:var(--dim);font-size:13px;margin:0 0 22px}
  .legend{
    display:flex;gap:18px;justify-content:center;margin-bottom:24px;
    font-size:13px;font-weight:800;
  }
  .legend span{display:flex;align-items:center;gap:6px}
  .dot{width:16px;height:16px;border-radius:50%;display:inline-block}
  .dot.g{background:var(--groom)}
  .dot.b{background:var(--bride)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:600px){.grid{grid-template-columns:1fr}}
  .table{
    border:2px solid var(--line);border-radius:16px;padding:14px 16px;background:#fff;
  }
  .table.wide{grid-column:1 / -1}
  .table h2{margin:0 0 2px;font-size:17px;font-weight:900}
  .table .cap{color:var(--dim);font-size:12px;margin:0 0 10px}
  .seats{display:flex;flex-wrap:wrap;gap:8px}
  .seat{
    padding:7px 14px;border-radius:999px;font-size:13.5px;font-weight:800;
  }
  .seat.g{background:var(--groom-bg);border:1.5px solid var(--groom);color:#8a6410}
  .seat.b{background:var(--bride-bg);border:1.5px solid var(--bride);color:#c22d5e}
  .seat.fixed{background:var(--groom);color:#fff;border:1.5px solid #b8860b}
  .rule{font-size:11.5px;color:var(--dim);margin-top:8px}
  .totals{
    margin-top:24px;padding:16px 20px;background:#faf7ee;border:1.5px solid var(--line);
    border-radius:14px;font-size:14px;
  }
  .totals b{font-size:15px}
  .foot{text-align:center;color:var(--dim);font-size:11.5px;margin-top:22px;line-height:1.9}
</style>
</head>
<body>
<div class="wrap">
  <h1>🍾 席の枠 早わかり図</h1>
  <p class="sub">「どの卓に・どちら側が・何人入るか」だけ先に決めてあります。<br><b>誰がどの卓かは当日のくじで完全ランダム</b>です。</p>
  <div class="legend">
    <span><i class="dot g"></i>新郎側の席</span>
    <span><i class="dot b"></i>新婦側の席</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="totals" id="totals"></div>
  <p class="foot">全卓に男女どちらも必ず入るよう抽選条件がかかっています。<br>新婦側が1人だけの卓は仕組み上できません(必ず2人以上か0人)。</p>
</div>

<script>
/* ipad.html の TABLES / FIXED と同じ内容に合わせておくこと */
const TABLES = [
  {name:"1卓",  groom:3, bride:2},
  {name:"2卓",  groom:3, bride:2},
  {name:"3卓",  groom:3, bride:2},
  {name:"4卓",  groom:3, bride:2},
  {name:"5卓",  groom:5, bride:0},
  {name:"6卓",  groom:5, bride:0},
  {name:"大卓", groom:6, bride:4, minF:3, minM:3},
];
const FIXED = [
  {n:"佐藤 健太(幹事)", t:4},
  {n:"高橋 大輔(幹事)", t:5},
];

const grid = document.getElementById("grid");
TABLES.forEach((t,i)=>{
  const size = t.groom + t.bride;
  const div = document.createElement("div");
  div.className = "table" + (size > 6 ? " wide" : "");
  const fixedHere = FIXED.filter(f=>f.t===i);
  let seats = "";
  fixedHere.forEach(f=>{ seats += `<span class="seat fixed">📌 ${f.n}</span>`; });
  for(let k=0;k<t.groom - fixedHere.length;k++) seats += `<span class="seat g">新郎側</span>`;
  for(let k=0;k<t.bride;k++) seats += `<span class="seat b">新婦側</span>`;
  const rule = (t.minF || t.minM)
    ? `<p class="rule">※この卓は 女性${t.minF ?? 1}人以上・男性${t.minM ?? 1}人以上 になるよう抽選されます</p>` : "";
  div.innerHTML = `<h2>${t.name}</h2><p class="cap">${size}人卓</p><div class="seats">${seats}</div>${rule}`;
  grid.appendChild(div);
});
const g = TABLES.reduce((a,t)=>a+t.groom,0), b = TABLES.reduce((a,t)=>a+t.bride,0);
document.getElementById("totals").innerHTML =
  `<b>合計 ${g+b}名</b> = 新郎側 ${g}名(男19・女9)+ 新婦側 ${b}名(男2・女10)<br>` +
  `📌 = 幹事の固定席(この2人だけ席が決まっています)`;
</script>
</body>
</html>
